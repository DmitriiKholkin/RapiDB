        -- bulk 50 000 rows
        ;WITH bulk_rows AS (
          SELECT TOP 50000 ROW_NUMBER() OVER (ORDER BY (SELECT NULL)) AS n
          FROM sys.all_objects a CROSS JOIN sys.all_objects b
        )
        INSERT INTO mssql_master (
          category_id,unique_code,col_int,col_bigint,col_decimal,
          col_varchar,col_nvarchar,col_date,col_datetime2,
          col_bit,score,is_active
        )
        SELECT
          (ABS(CHECKSUM(NEWID()))%5)+1,
          N'CODE-BULK-'+RIGHT('00000000'+CAST(n AS NVARCHAR),8),
          ABS(CHECKSUM(NEWID()))%2000000000-1000000000,
          ABS(CAST(CHECKSUM(NEWID()) AS BIGINT)),
          CAST(ABS(CHECKSUM(NEWID()))%1000000 AS DECIMAL(18,6))/1000,
          'varchar_'+CAST(NEWID() AS VARCHAR(36)),
          N'nvarchar row '+CAST(n AS NVARCHAR),
          DATEADD(DAY,ABS(CHECKSUM(NEWID()))%9000,'2000-01-01'),
          DATEADD(SECOND,ABS(CHECKSUM(NEWID()))%777600000,'2000-01-01'),
          ABS(CHECKSUM(NEWID()))%2,
          ABS(CHECKSUM(NEWID()))%2001-1000,
          CASE WHEN ABS(CHECKSUM(NEWID()))%5>0 THEN 1 ELSE 0 END
        FROM bulk_rows;
        GO

        -- views
        CREATE OR ALTER VIEW mssql_master_active AS
          SELECT m.id,m.category_id,c.category_name,m.unique_code,m.unique_guid,
                 m.col_int,m.col_bigint,m.col_decimal,m.col_nvarchar,m.col_bit,
                 m.col_date,m.col_datetime2,m.score,m.created_at
          FROM mssql_master m JOIN mssql_category c ON m.category_id=c.category_id
          WHERE m.is_active=1;
        GO

        CREATE OR ALTER VIEW mssql_master_stats AS
          SELECT m.category_id, c.category_name,
                 COUNT(*) AS total_rows, SUM(CAST(m.is_active AS INT)) AS active_rows,
                 MAX(m.col_int) AS max_int, MIN(m.col_int) AS min_int,
                 ROUND(AVG(CAST(m.col_decimal AS FLOAT)),4) AS avg_decimal,
                 SUM(m.score) AS total_score, MAX(m.created_at) AS last_created
          FROM mssql_master m JOIN mssql_category c ON m.category_id=c.category_id
          GROUP BY m.category_id,c.category_name;
        GO

        CREATE OR ALTER VIEW mssql_master_xml_view AS
          SELECT id, unique_code, col_xml,
                 col_xml.value('(/root/child/@id)[1]','INT')              AS xml_child_id,
                 col_xml.value('(/root/child/text())[1]','NVARCHAR(100)') AS xml_child_text,
                 col_uniqueidentifier,score
          FROM mssql_master WHERE col_xml IS NOT NULL;
        GO

        -- procedures & functions
        CREATE OR ALTER PROCEDURE mssql_proc_insert
          @category_id TINYINT, @code NVARCHAR(40), @col_int INT,
          @col_nvarchar NVARCHAR(500), @score INT
        AS BEGIN
          SET NOCOUNT ON;
          INSERT INTO mssql_master(category_id,unique_code,col_int,col_nvarchar,score)
          VALUES(@category_id,@code,@col_int,@col_nvarchar,@score);
          SELECT SCOPE_IDENTITY() AS new_id;
        END;
        GO

        CREATE OR ALTER PROCEDURE mssql_proc_update_scores
          @category_id TINYINT, @delta INT
        AS BEGIN
          SET NOCOUNT ON;
          UPDATE mssql_master
          SET score=CASE WHEN score+@delta>1000 THEN 1000
                         WHEN score+@delta<-1000 THEN -1000
                         ELSE score+@delta END,
              updated_at=SYSUTCDATETIME()
          WHERE category_id=@category_id;
          SELECT @@ROWCOUNT AS rows_updated;
        END;
        GO

        CREATE OR ALTER FUNCTION mssql_fn_top_score(@category_id TINYINT) RETURNS INT AS BEGIN
          DECLARE @r INT;
          SELECT @r=MAX(score) FROM mssql_master WHERE category_id=@category_id;
          RETURN ISNULL(@r,0);
        END;
        GO

        CREATE OR ALTER FUNCTION mssql_fn_format_code(@code NVARCHAR(40)) RETURNS NVARCHAR(45) AS BEGIN
          RETURN N'['+UPPER(@code)+N']';
        END;
        GO

        -- ══════════════════════════════════════════════════════════════
        -- USER-DEFINED TYPES
        -- ══════════════════════════════════════════════════════════════
        CREATE TYPE dbo.EmailType      FROM NVARCHAR(255) NOT NULL;
        CREATE TYPE dbo.PhoneType      FROM NVARCHAR(30)  NULL;
        CREATE TYPE dbo.ScoreType      FROM INT           NOT NULL;
        CREATE TYPE dbo.CountryCode    FROM CHAR(2)       NOT NULL;
        CREATE TYPE dbo.CurrencyCode   FROM CHAR(3)       NOT NULL;
