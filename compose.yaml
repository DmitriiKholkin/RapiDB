services:

  # ─────────────────────────────────────────────
  # PostgreSQL 15
  # ─────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: rapidb-pg
    environment:
      POSTGRES_USER: db_admin
      POSTGRES_PASSWORD: pg_pass123
      POSTGRES_DB: rapidb_pg_db
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h 127.0.0.1 -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  postgres-seed:
    image: postgres:15-alpine
    container_name: rapidb-pg-seed
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    environment:
      PGPASSWORD: pg_pass123
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        set -eu
        psql -v ON_ERROR_STOP=1 -h postgres -U db_admin -d rapidb_pg_db << 'EOSQL'

        -- Reset schema so reruns after partial failures are deterministic.
        DROP SCHEMA IF EXISTS public CASCADE;
        CREATE SCHEMA public;
        GRANT ALL ON SCHEMA public TO db_admin;
        GRANT ALL ON SCHEMA public TO public;

        -- ── Extensions ────────────────────────────────────────────
        CREATE EXTENSION IF NOT EXISTS "pgcrypto";
        CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
        CREATE EXTENSION IF NOT EXISTS "pg_trgm";
        CREATE EXTENSION IF NOT EXISTS "btree_gin";

        -- ── Reference table ───────────────────────────────────────
        CREATE TABLE pg_category (
          category_id   SMALLINT    PRIMARY KEY,
          category_name VARCHAR(50) NOT NULL UNIQUE,
          description   TEXT
        );
        INSERT INTO pg_category VALUES
          (1,'alpha','First category'),
          (2,'beta','Second category'),
          (3,'gamma','Third category'),
          (4,'delta','Fourth category'),
          (5,'epsilon','Fifth category');

        -- ── Master table — every PG type ──────────────────────────
        CREATE TABLE pg_master (
          id                BIGSERIAL PRIMARY KEY,
          category_id       SMALLINT  NOT NULL REFERENCES pg_category(category_id) ON DELETE RESTRICT ON UPDATE CASCADE,
          unique_code       VARCHAR(40) NOT NULL UNIQUE,
          unique_uuid       UUID        NOT NULL UNIQUE DEFAULT gen_random_uuid(),
          -- numeric
          col_smallint      SMALLINT,
          col_int           INTEGER,
          col_bigint        BIGINT,
          col_decimal       DECIMAL(18,6),
          col_numeric       NUMERIC(18,6),
          col_real          REAL,
          col_double        DOUBLE PRECISION,
          col_money         MONEY,
          -- character
          col_char          CHAR(10),
          col_varchar       VARCHAR(255),
          col_text          TEXT,
          col_name_type     NAME,
          -- binary
          col_bytea         BYTEA,
          -- datetime
          col_date          DATE,
          col_time          TIME WITHOUT TIME ZONE,
          col_timetz        TIME WITH TIME ZONE,
          col_timestamp     TIMESTAMP WITHOUT TIME ZONE,
          col_timestamptz   TIMESTAMP WITH TIME ZONE,
          col_interval      INTERVAL,
          -- bool
          col_bool          BOOLEAN,
          -- json / xml / uuid
          col_json          JSON,
          col_jsonb         JSONB,
          col_xml           XML,
          -- network
          col_cidr          CIDR,
          col_inet          INET,
          col_macaddr       MACADDR,
          col_macaddr8      MACADDR8,
          -- geometric
          col_point         POINT,
          col_line          LINE,
          col_lseg          LSEG,
          col_box           BOX,
          col_path          PATH,
          col_polygon       POLYGON,
          col_circle        CIRCLE,
          -- arrays
          col_int_arr       INTEGER[],
          col_text_arr      TEXT[],
          col_bool_arr      BOOLEAN[],
          -- ranges
          col_int4range     INT4RANGE,
          col_int8range     INT8RANGE,
          col_numrange      NUMRANGE,
          col_tsrange       TSRANGE,
          col_tstzrange     TSTZRANGE,
          col_daterange     DATERANGE,
          -- fts
          col_tsvector      TSVECTOR,
          col_tsquery       TSQUERY,
          -- bit
          col_bit           BIT(8),
          col_varbit        BIT VARYING(64),
          -- misc
          col_oid           OID,
          col_pg_lsn        PG_LSN,
          -- meta
          created_at        TIMESTAMPTZ NOT NULL DEFAULT now(),
          updated_at        TIMESTAMPTZ NOT NULL DEFAULT now(),
          is_active         BOOLEAN     NOT NULL DEFAULT TRUE,
          score             INTEGER     NOT NULL DEFAULT 0,
          tags              TEXT[]      NOT NULL DEFAULT '{}',
          -- constraints
          CONSTRAINT chk_score       CHECK (score BETWEEN -1000 AND 1000),
          CONSTRAINT chk_code_len    CHECK (char_length(unique_code) >= 3)
        );

        -- indexes
        CREATE INDEX idx_pg_int         ON pg_master(col_int);
        CREATE INDEX idx_pg_cat_score   ON pg_master(category_id, score DESC);
        CREATE INDEX idx_pg_active      ON pg_master(created_at) WHERE is_active = TRUE;
        CREATE INDEX idx_pg_jsonb       ON pg_master USING GIN(col_jsonb);
        CREATE INDEX idx_pg_tags        ON pg_master USING GIN(tags);
        CREATE INDEX idx_pg_tsvec       ON pg_master USING GIN(col_tsvector);
        CREATE INDEX idx_pg_brin        ON pg_master USING BRIN(created_at);
        CREATE INDEX idx_pg_hash_code   ON pg_master USING HASH(unique_code);
        CREATE INDEX idx_pg_trgm        ON pg_master USING GIN(col_varchar gin_trgm_ops);

