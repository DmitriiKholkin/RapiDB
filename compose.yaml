           ROW(155,89,182)::pg_rgb_type,
           '[0.0,29.99)'),
          ('disabled','guest','starter','none','dave@example.com',
           -100,5.00,'GB',
           NULL,NULL,NULL,NULL),
          ('banned','guest','free','none','spammer@evil.com',
           -1000,0.00,'US',
           NULL,NULL,NULL,NULL);

        -- ══════════════════════════════════════════════════════════════
        -- SEQUENCES (standalone)
        -- ══════════════════════════════════════════════════════════════
        CREATE SEQUENCE pg_invoice_seq
          AS BIGINT
          START WITH 1000
          INCREMENT BY 1
          MINVALUE 1000
          MAXVALUE 9999999
          NO CYCLE
          CACHE 10;

        CREATE SEQUENCE pg_order_seq
          AS BIGINT
          START WITH 500000
          INCREMENT BY 5
          MINVALUE 500000
          MAXVALUE 99999999
          CYCLE
          CACHE 20;

        CREATE SEQUENCE pg_batch_seq
          AS INTEGER
          START WITH 1
          INCREMENT BY 100
          MINVALUE 1
          NO CYCLE
          CACHE 1;

        CREATE SEQUENCE pg_sku_seq
          AS INTEGER
          START WITH 10000
          INCREMENT BY 1
          MINVALUE 10000
          MAXVALUE 99999
          NO CYCLE
          CACHE 50;

        -- Advance sequences to non-trivial state
        SELECT nextval('pg_invoice_seq') FROM generate_series(1,25);
        SELECT nextval('pg_order_seq')   FROM generate_series(1,10);
        SELECT nextval('pg_batch_seq')   FROM generate_series(1,5);
        SELECT nextval('pg_sku_seq')     FROM generate_series(1,42);

        -- Table that uses the sequence explicitly (not SERIAL)
        CREATE TABLE pg_invoices (
          invoice_no   BIGINT       PRIMARY KEY DEFAULT nextval('pg_invoice_seq'),
          order_no     BIGINT       DEFAULT nextval('pg_order_seq'),
          master_id    BIGINT       REFERENCES pg_master(id) ON DELETE SET NULL,
          amount       pg_money_amount_type,
          status       pg_status_enum DEFAULT 'pending',
          issued_at    TIMESTAMPTZ  NOT NULL DEFAULT now(),
          due_at       TIMESTAMPTZ  NOT NULL DEFAULT (now() + INTERVAL '30 days'),
          paid_at      TIMESTAMPTZ
        );

        INSERT INTO pg_invoices (master_id, amount, status)
        SELECT id,
               ROW(round((random()*9000+100)::NUMERIC,2),'USD')::pg_money_amount_type,
               (ARRAY['pending','active','archived']::pg_status_enum[])[floor(random()*3+1)]
        FROM pg_master
        WHERE id <= 20;

        -- ══════════════════════════════════════════════════════════════
        -- TRIGGER FUNCTIONS & TRIGGERS
        -- ══════════════════════════════════════════════════════════════

        -- Audit log table
        CREATE TABLE pg_master_audit (
          audit_id    BIGSERIAL   PRIMARY KEY,
          operation   CHAR(1)     NOT NULL CHECK (operation IN ('I','U','D')),
          master_id   BIGINT,
          old_score   INTEGER,
          new_score   INTEGER,
          old_active  BOOLEAN,
          new_active  BOOLEAN,
          old_code    VARCHAR(40),
          new_code    VARCHAR(40),
          changed_by  TEXT        NOT NULL DEFAULT current_user,
          changed_at  TIMESTAMPTZ NOT NULL DEFAULT now(),
          client_addr INET        DEFAULT inet_client_addr()
        );

        -- Function: auto-update updated_at
        CREATE OR REPLACE FUNCTION fn_pg_set_updated_at()
        RETURNS TRIGGER LANGUAGE plpgsql AS $$$$
        BEGIN
          NEW.updated_at := now();
          RETURN NEW;
        END; $$$$;

        -- Function: audit INSERT / UPDATE / DELETE
        CREATE OR REPLACE FUNCTION fn_pg_master_audit()
        RETURNS TRIGGER LANGUAGE plpgsql AS $$$$
        BEGIN
          IF TG_OP = 'INSERT' THEN
            INSERT INTO pg_master_audit(operation,master_id,new_score,new_active,new_code)
            VALUES('I',NEW.id,NEW.score,NEW.is_active,NEW.unique_code);
          ELSIF TG_OP = 'UPDATE' THEN
            INSERT INTO pg_master_audit(operation,master_id,old_score,new_score,old_active,new_active,old_code,new_code)
            VALUES('U',NEW.id,OLD.score,NEW.score,OLD.is_active,NEW.is_active,OLD.unique_code,NEW.unique_code);
          ELSIF TG_OP = 'DELETE' THEN
            INSERT INTO pg_master_audit(operation,master_id,old_score,old_active,old_code)
            VALUES('D',OLD.id,OLD.score,OLD.is_active,OLD.unique_code);
          END IF;
          RETURN NULL;
        END; $$$$;

        -- Function: clamp score, ensure tags not null
        CREATE OR REPLACE FUNCTION fn_pg_normalize_before_write()
        RETURNS TRIGGER LANGUAGE plpgsql AS $$$$
        BEGIN
          NEW.score := GREATEST(-1000, LEAST(1000, COALESCE(NEW.score,0)));
          IF NEW.tags IS NULL THEN NEW.tags := '{}'; END IF;
          RETURN NEW;
        END; $$$$;

        -- Function: prevent deletion of high-score active rows
        CREATE OR REPLACE FUNCTION fn_pg_protect_high_score()
        RETURNS TRIGGER LANGUAGE plpgsql AS $$$$
        BEGIN
          IF OLD.score > 900 AND OLD.is_active THEN
            RAISE EXCEPTION
              'Cannot delete active row id=% score=% > 900. Deactivate first.',
              OLD.id, OLD.score;
          END IF;
          RETURN OLD;
        END; $$$$;

        -- Function: statement-level trigger logging bulk ops
        CREATE OR REPLACE FUNCTION fn_pg_log_bulk_op()
        RETURNS TRIGGER LANGUAGE plpgsql AS $$$$
        BEGIN
          RAISE NOTICE 'Bulk % on pg_master at %', TG_OP, now();
          RETURN NULL;
        END; $$$$;

        -- Attach triggers to pg_master
        CREATE TRIGGER trg_pg_master_updated_at
          BEFORE UPDATE ON pg_master
          FOR EACH ROW EXECUTE FUNCTION fn_pg_set_updated_at();

        CREATE TRIGGER trg_pg_master_normalize
          BEFORE INSERT OR UPDATE ON pg_master
          FOR EACH ROW EXECUTE FUNCTION fn_pg_normalize_before_write();

        CREATE TRIGGER trg_pg_master_audit
          AFTER INSERT OR UPDATE OR DELETE ON pg_master
          FOR EACH ROW EXECUTE FUNCTION fn_pg_master_audit();

        CREATE TRIGGER trg_pg_protect_high_score
          BEFORE DELETE ON pg_master
          FOR EACH ROW EXECUTE FUNCTION fn_pg_protect_high_score();

        CREATE TRIGGER trg_pg_master_bulk_log
          AFTER INSERT OR UPDATE OR DELETE ON pg_master
          FOR EACH STATEMENT EXECUTE FUNCTION fn_pg_log_bulk_op();

        -- Attach triggers to pg_typed_profiles
        CREATE TRIGGER trg_pg_typed_profiles_updated_at
          BEFORE UPDATE ON pg_typed_profiles
          FOR EACH ROW EXECUTE FUNCTION fn_pg_set_updated_at();

        -- Fire some audit records via DML
        UPDATE pg_master SET score = 500,  is_active = TRUE  WHERE unique_code = 'CODE-MAX-001';
        UPDATE pg_master SET score = -500, is_active = FALSE WHERE unique_code = 'CODE-MIN-002';
        UPDATE pg_master SET score = 1     WHERE unique_code = 'CODE-NULL-003';
        UPDATE pg_master SET score = 75    WHERE unique_code = 'CODE-SPEC-004';

        -- ══════════════════════════════════════════════════════════════
        -- MATERIALIZED VIEWS
        -- ══════════════════════════════════════════════════════════════

        CREATE MATERIALIZED VIEW pg_matview_category_stats AS
          SELECT
            m.category_id,
            c.category_name,
            count(*)                                                    AS total_rows,
            count(*) FILTER (WHERE m.is_active)                        AS active_rows,
            count(*) FILTER (WHERE NOT m.is_active)                    AS inactive_rows,
            max(m.score)                                                AS max_score,
            min(m.score)                                                AS min_score,
            round(avg(m.score)::NUMERIC,2)                             AS avg_score,
            sum(m.score)                                                AS total_score,
            percentile_cont(0.5)  WITHIN GROUP (ORDER BY m.score)      AS median_score,
            percentile_cont(0.95) WITHIN GROUP (ORDER BY m.score)      AS p95_score,
            percentile_cont(0.05) WITHIN GROUP (ORDER BY m.score)      AS p05_score,
            max(m.col_int)                                              AS max_int,
            min(m.col_int)                                              AS min_int,
            round(avg(m.col_decimal)::NUMERIC,4)                       AS avg_decimal,
            count(*) FILTER (WHERE m.col_jsonb IS NOT NULL)            AS rows_with_jsonb,
            count(*) FILTER (WHERE m.col_tsvector IS NOT NULL)         AS rows_with_fts,
            max(m.created_at)                                           AS last_created,
            min(m.created_at)                                           AS first_created,
            now()                                                       AS refreshed_at
          FROM pg_master m
          JOIN pg_category c USING (category_id)
          GROUP BY m.category_id, c.category_name
        WITH DATA;

        CREATE UNIQUE INDEX idx_pg_matview_cat_id
          ON pg_matview_category_stats(category_id);
        CREATE INDEX idx_pg_matview_total_rows
          ON pg_matview_category_stats(total_rows DESC);

        -- Top scorers matview with window functions
        CREATE MATERIALIZED VIEW pg_matview_top_scorers AS
          SELECT
            id, category_id, unique_code, unique_uuid,
            col_int, col_bigint, col_varchar, col_bool, col_jsonb,
            score,
            rank()   OVER (ORDER BY score DESC)                         AS global_rank,
            rank()   OVER (PARTITION BY category_id ORDER BY score DESC) AS category_rank,
            percent_rank() OVER (ORDER BY score DESC)                   AS pct_rank,
            ntile(4) OVER (ORDER BY score DESC)                         AS quartile,
            ntile(10) OVER (ORDER BY score DESC)                        AS decile,
            sum(score) OVER (PARTITION BY category_id)                  AS cat_total_score,
            avg(score) OVER ()                                          AS global_avg_score,
            created_at
          FROM pg_master
          WHERE is_active = TRUE
        WITH DATA;

        CREATE INDEX idx_pg_matview_top_global
          ON pg_matview_top_scorers(global_rank);
        CREATE INDEX idx_pg_matview_top_cat
          ON pg_matview_top_scorers(category_id, category_rank);

        -- JSON / array / FTS statistics matview
        CREATE MATERIALIZED VIEW pg_matview_type_coverage AS
          SELECT
            count(*)                                                         AS total,
            round(count(*) FILTER (WHERE col_smallint   IS NOT NULL)*100.0/count(*),1) AS pct_smallint,
            round(count(*) FILTER (WHERE col_jsonb       IS NOT NULL)*100.0/count(*),1) AS pct_jsonb,
            round(count(*) FILTER (WHERE col_int_arr     IS NOT NULL)*100.0/count(*),1) AS pct_arrays,
            round(count(*) FILTER (WHERE col_tsvector    IS NOT NULL)*100.0/count(*),1) AS pct_fts,
            round(count(*) FILTER (WHERE col_inet        IS NOT NULL)*100.0/count(*),1) AS pct_inet,
            round(count(*) FILTER (WHERE col_bytea       IS NOT NULL)*100.0/count(*),1) AS pct_bytea,
            round(count(*) FILTER (WHERE col_point       IS NOT NULL)*100.0/count(*),1) AS pct_geo,
            round(count(*) FILTER (WHERE col_int4range   IS NOT NULL)*100.0/count(*),1) AS pct_ranges,
            round(count(*) FILTER (WHERE col_xml         IS NOT NULL)*100.0/count(*),1) AS pct_xml,
            round(count(*) FILTER (WHERE col_bool = TRUE)*100.0/count(*),1)            AS pct_bool_true,
            now()                                                            AS refreshed_at
          FROM pg_master
        WITH DATA;

        -- Inactive records summary (WITH NO DATA — must REFRESH manually)
        CREATE MATERIALIZED VIEW pg_matview_inactive_summary AS
          SELECT
            category_id,
            count(*)         AS cnt,
            avg(score)::NUMERIC AS avg_score,
            max(updated_at)  AS last_updated
          FROM pg_master
          WHERE is_active = FALSE
          GROUP BY category_id
        WITH NO DATA;

        SELECT 'PostgreSQL seed complete: '||count(*)||' rows in pg_master' FROM pg_master;
        EOSQL

  # ─────────────────────────────────────────────
  # MySQL 8.0
  # ─────────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: rapidb-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_pass123
      MYSQL_USER: mysql_user
      MYSQL_PASSWORD: mysql_pass123
      MYSQL_DATABASE: rapidb_mysql_db
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent" ]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 20s

  mysql-seed:
    image: mysql:8.0
    container_name: rapidb-mysql-seed
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        mysql -h mysql -u root -proot_pass123 rapidb_mysql_db << 'EOSQL'

        SET NAMES utf8mb4;
        SET foreign_key_checks = 0;

        -- clean up from previous/partial runs
        DROP VIEW IF EXISTS mysql_master_json_view;
        DROP VIEW IF EXISTS mysql_master_stats;
        DROP VIEW IF EXISTS mysql_master_active;
        DROP FUNCTION IF EXISTS mysql_fn_format_code;
        DROP FUNCTION IF EXISTS mysql_fn_top_score;
        DROP PROCEDURE IF EXISTS mysql_proc_update_scores;
        DROP PROCEDURE IF EXISTS mysql_proc_insert;
        DROP TABLE IF EXISTS mysql_score_history;
        DROP TABLE IF EXISTS mysql_master_audit;
        DROP TABLE IF EXISTS mysql_master;
        DROP TABLE IF EXISTS mysql_category;

        -- reference table
        CREATE TABLE mysql_category (
          category_id   TINYINT UNSIGNED PRIMARY KEY,
          category_name VARCHAR(50) NOT NULL UNIQUE,
          description   TEXT
        ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

        INSERT INTO mysql_category VALUES
          (1,'alpha','First'),(2,'beta','Second'),(3,'gamma','Third'),
          (4,'delta','Fourth'),(5,'epsilon','Fifth');

        -- master table — every MySQL type
        CREATE TABLE mysql_master (
          id              BIGINT UNSIGNED   NOT NULL AUTO_INCREMENT PRIMARY KEY,
          category_id     TINYINT UNSIGNED  NOT NULL,
          unique_code     VARCHAR(40)       NOT NULL,
          unique_uuid     CHAR(36)          NOT NULL DEFAULT (UUID()),
          -- exact numeric
          col_tinyint     TINYINT,
          col_tinyint_u   TINYINT UNSIGNED,
          col_smallint    SMALLINT,
          col_mediumint   MEDIUMINT,
          col_int         INT,
          col_bigint      BIGINT,
          col_decimal     DECIMAL(18,6),
          col_bit         BIT(8),
          col_bool        BOOLEAN,
          -- approximate numeric
          col_float       FLOAT,
          col_double      DOUBLE,
          -- character
          col_char        CHAR(10),
          col_varchar     VARCHAR(500),
          col_tinytext    TINYTEXT,
          col_text        TEXT,
          col_mediumtext  MEDIUMTEXT,
          col_longtext    LONGTEXT,
          -- binary
          col_binary      BINARY(16),
          col_varbinary   VARBINARY(255),
          col_tinyblob    TINYBLOB,
          col_blob        BLOB,
          col_mediumblob  MEDIUMBLOB,
          col_longblob    LONGBLOB,
          -- datetime
          col_date        DATE,
          col_time        TIME(6),
          col_datetime    DATETIME(6),
          col_timestamp   TIMESTAMP(6) NULL DEFAULT NULL,
          col_year        YEAR,
          -- enum / set
          col_enum        ENUM('pending','active','disabled','archived','deleted'),
          col_set         SET('read','write','execute','admin','superuser'),
          -- json
          col_json        JSON,
          -- spatial
          col_geometry    GEOMETRY,
          col_point       POINT,
          col_linestring  LINESTRING,
          col_polygon     POLYGON,
          -- meta
          created_at      DATETIME(6) NOT NULL DEFAULT CURRENT_TIMESTAMP(6),
          updated_at      DATETIME(6) NOT NULL DEFAULT CURRENT_TIMESTAMP(6) ON UPDATE CURRENT_TIMESTAMP(6),
          is_active       BOOLEAN     NOT NULL DEFAULT TRUE,
          score           INT         NOT NULL DEFAULT 0,
          -- constraints
          CONSTRAINT uq_mysql_code   UNIQUE (unique_code),
          CONSTRAINT uq_mysql_uuid   UNIQUE (unique_uuid),
          CONSTRAINT fk_mysql_cat    FOREIGN KEY (category_id) REFERENCES mysql_category(category_id) ON DELETE RESTRICT ON UPDATE CASCADE,
          CONSTRAINT chk_mysql_score CHECK (score BETWEEN -1000 AND 1000),
          CONSTRAINT chk_mysql_code  CHECK (char_length(unique_code) >= 3)
        ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

        -- indexes
        CREATE INDEX idx_mysql_int        ON mysql_master(col_int);
        CREATE INDEX idx_mysql_cat_score  ON mysql_master(category_id, score DESC);
        CREATE INDEX idx_mysql_date       ON mysql_master(col_date);
        CREATE INDEX idx_mysql_enum       ON mysql_master(col_enum);
        CREATE INDEX idx_mysql_json_score ON mysql_master((CAST(col_json->>'$$.score' AS UNSIGNED)));
        ALTER TABLE mysql_master ADD FULLTEXT INDEX idx_mysql_fulltext(col_varchar, col_text);

        -- row 1: maximum values
        INSERT INTO mysql_master (
          category_id, unique_code,
          col_tinyint, col_tinyint_u, col_smallint, col_mediumint, col_int, col_bigint,
          col_decimal, col_bit, col_bool, col_float, col_double,
          col_char, col_varchar, col_tinytext, col_text, col_mediumtext, col_longtext,
          col_binary, col_varbinary, col_tinyblob, col_blob,
          col_date, col_time, col_datetime, col_timestamp, col_year,
          col_enum, col_set, col_json,
          col_geometry, col_point, col_linestring, col_polygon, score
        ) VALUES (
          1,'CODE-MAX-001',
          127,255,32767,8388607,2147483647,9223372036854775807,
          123456.789012,b'10101010',1,3.14159,2.718281828459045,
          'Hello     ','Привет мир! 😀 Unicode VARCHAR тест — всё работает',
          'TinyText value','TEXT поле: Arabic العربية, Chinese 中文, Emoji 🔥💯',
          REPEAT('MediumText содержимое для теста. ',100),REPEAT('LongText content row. ',500),
          UNHEX('DEADBEEF00000000000000000000CAFE'),UNHEX('CAFEBABE0102030405'),
          0xAB,0xDEADBEEF,
          '2024-02-29','23:59:59.999999','2024-07-04 12:34:56.123456','2024-01-01 00:00:00.000000',2024,
          'active','read,write,admin',
          '{"name":"max","score":100,"tags":["a","b","c"],"nested":{"x":1},"unicode":"Привет"}',
          ST_GeomFromText('POINT(55.7558 37.6173)'),
          ST_PointFromText('POINT(10 20)'),
          ST_LineFromText('LINESTRING(0 0,5 5,10 0,15 5)'),
          ST_PolyFromText('POLYGON((0 0,10 0,10 10,0 10,0 0))'),
          1000
        );

        -- row 2: minimum / negative values
        INSERT INTO mysql_master (
          category_id, unique_code,
          col_tinyint, col_tinyint_u, col_smallint, col_mediumint, col_int, col_bigint,
          col_decimal, col_bit, col_bool, col_float, col_double,
          col_char, col_varchar, col_text,
          col_date, col_time, col_datetime, col_year,
          col_enum, col_set, col_json, score
        ) VALUES (
          2,'CODE-MIN-002',
          -128,0,-32768,-8388608,-2147483648,-9223372036854775808,
          -999999.999999,b'00000000',0,-3.14159,-2.718281828459045,
          '          ','','Минимальные значения. <script>alert(1)</script>',
          '1000-01-01','-838:59:59','1000-01-01 00:00:00.000000',1901,
          'pending','','null',-1000
        );

        -- row 3: NULLs
        INSERT INTO mysql_master(category_id,unique_code,score) VALUES(3,'CODE-NULL-003',0);

        -- row 4: special chars
        INSERT INTO mysql_master (
          category_id, unique_code, col_varchar, col_text, col_json, col_enum, score
        ) VALUES (
          4,'CODE-SPEC-004',
          'Quote: "double" and ''single'', backslash: \\, tab: char',
          'Arabic: مرحبا, Chinese: 你好, Japanese: こんにちは, Korean: 안녕하세요',
          '{"key":"value with \\"quotes\\"","unicode":"Привет","array":[1,null,true,false]}',
          'archived',42
        );

        -- row 5: JSON deep nesting
        INSERT INTO mysql_master (
          category_id, unique_code, col_varchar, col_json,
          col_enum, col_set, score
        ) VALUES (
          5,'CODE-JSON-005',
          'Deep nested JSON test',
          '{"level1":{"level2":{"level3":{"level4":{"value":42,"arr":[1,2,3],"flag":true}}},"sibling":"data"},"root_arr":[{"id":1,"name":"Alice"},{"id":2,"name":"Bob"}],"nullval":null}',
          'active','read,write,execute',88
        );

        -- row 6: spatial focus
        INSERT INTO mysql_master (
          category_id, unique_code, col_varchar,
          col_geometry, col_point, col_linestring, col_polygon,
          col_enum, score
        ) VALUES (
          1,'CODE-GEO-006','Spatial types focus',
          ST_GeomFromText('MULTIPOINT((0 0),(1 1),(2 2))'),
          ST_PointFromText('POINT(51.5074 -0.1278)'),
          ST_LineFromText('LINESTRING(0 0,1 1,2 0,3 1,4 0)'),
          ST_PolyFromText('POLYGON((0 0,5 0,5 5,0 5,0 0),(1 1,2 1,2 2,1 2,1 1))'),
          'active',70
        );

        -- row 7: enum/set all combos
        INSERT INTO mysql_master(category_id,unique_code,col_enum,col_set,col_varchar,score)
          VALUES(2,'CODE-ENUM-007-1','pending','read','Pending read only',10),
                (2,'CODE-ENUM-007-2','active','read,write','Active read+write',20),
                (2,'CODE-ENUM-007-3','disabled','execute,admin','Disabled exec+admin',30),
                (2,'CODE-ENUM-007-4','archived','read,write,execute,admin,superuser','Archived all perms',40),
                (2,'CODE-ENUM-007-5','deleted','','Deleted no perms',5);

        -- row 8: binary blobs
        INSERT INTO mysql_master (
          category_id, unique_code,
          col_binary, col_varbinary, col_tinyblob, col_blob, col_mediumblob, col_longblob,
          col_varchar, score
        ) VALUES (
          3,'CODE-BLOB-008',
          UNHEX(RPAD('DEADBEEF',32,'00')),
          UNHEX(REPEAT('CAFEBABE',8)),
          REPEAT(0x41,255),
          REPEAT(0x42,65535),
          0xFF,0xFE,
          'Binary blobs focus row',15
        );

        -- row 9: datetime edge cases
        INSERT INTO mysql_master (
          category_id, unique_code,
          col_date, col_time, col_datetime, col_timestamp, col_year,
          col_varchar, score
        ) VALUES
          (4,'CODE-DT-009-1','2024-02-29','23:59:59.999999','2024-12-31 23:59:59.999999','2024-01-01 00:00:00.000001',2024,'Leap year max time',5),
          (4,'CODE-DT-009-2','1000-01-01','-838:59:59','1000-01-01 00:00:00.000000',NULL,1901,'Min date min time',5),
          (4,'CODE-DT-009-3','2038-01-18','00:00:01.000000','2038-01-19 03:14:07.000000','2038-01-19 03:14:07.000000',2155,'Near epoch overflow',5);

        -- bulk 50 000 rows
        SET SESSION cte_max_recursion_depth = 50001;
        INSERT INTO mysql_master (
          category_id, unique_code,
          col_int, col_bigint, col_decimal, col_float, col_double,
          col_varchar, col_text,
          col_date, col_datetime, col_timestamp,
          col_bool, col_enum, col_set, col_json, score, is_active
        )
        WITH RECURSIVE cte(n) AS (
          SELECT 1 UNION ALL SELECT n+1 FROM cte WHERE n<50000
        )
        SELECT
          MOD(n,5)+1,
          CONCAT('CODE-BULK-',LPAD(n,8,'0')),
          FLOOR(RAND()*4294967295)-2147483648,
          FLOOR(RAND()*9000000000),
          ROUND(RAND()*999999,6),
          RAND()*1000,
          RAND()*1000000,
          CONCAT('varchar_',MD5(n)),
          CONCAT(REPEAT('bulk row ',3),n),
          DATE_ADD('2000-01-01',INTERVAL FLOOR(RAND()*9000) DAY),
          DATE_ADD('2000-01-01 00:00:00',INTERVAL FLOOR(RAND()*777600000) SECOND),
          IF(RAND()>0.3,DATE_ADD('2020-01-01',INTERVAL FLOOR(RAND()*1826) DAY),NULL),
          ROUND(RAND()),
          ELT(FLOOR(RAND()*5)+1,'pending','active','disabled','archived','deleted'),
          IF(RAND()>0.5,'read,write','admin'),
          JSON_OBJECT('row',n,'val',ROUND(RAND(),4),'active',IF(RAND()>0.3,TRUE,FALSE)),
          FLOOR(RAND()*2001)-1000,
          RAND()>0.2
        FROM cte;

        -- views
        CREATE OR REPLACE VIEW mysql_master_active AS
          SELECT m.id,m.category_id,c.category_name,m.unique_code,m.unique_uuid,
                 m.col_int,m.col_bigint,m.col_decimal,m.col_varchar,m.col_text,
                 m.col_bool,m.col_enum,m.col_set,m.col_json,m.col_date,m.col_datetime,
                 m.score,m.created_at
          FROM mysql_master m JOIN mysql_category c USING(category_id)
          WHERE m.is_active=TRUE;

        CREATE OR REPLACE VIEW mysql_master_stats AS
          SELECT m.category_id, c.category_name,
                 COUNT(*) AS total_rows, SUM(m.is_active) AS active_rows,
                 MAX(m.col_int) AS max_int, MIN(m.col_int) AS min_int,
                 ROUND(AVG(m.col_decimal),4) AS avg_decimal,
                 SUM(m.score) AS total_score, MAX(m.created_at) AS last_created
          FROM mysql_master m JOIN mysql_category c USING(category_id)
          GROUP BY m.category_id,c.category_name;

        CREATE OR REPLACE VIEW mysql_master_json_view AS
          SELECT id, unique_code, col_json,
                 col_json->>'$$.name'   AS json_name,
                 col_json->>'$$.score'  AS json_score,
                 JSON_TYPE(col_json)   AS json_root_type,
                 col_enum, col_set, score
          FROM mysql_master WHERE col_json IS NOT NULL AND col_json!='null';

        -- procedures & functions
        DELIMITER //
        DROP PROCEDURE IF EXISTS mysql_proc_insert;
        CREATE PROCEDURE mysql_proc_insert(
          IN p_category_id TINYINT UNSIGNED, IN p_code VARCHAR(40),
          IN p_int INT, IN p_varchar VARCHAR(500), IN p_enum VARCHAR(20), IN p_score INT
        ) BEGIN
          INSERT INTO mysql_master(category_id,unique_code,col_int,col_varchar,col_enum,score)
          VALUES(p_category_id,p_code,p_int,p_varchar,p_enum,p_score);
        END //
        DROP PROCEDURE IF EXISTS mysql_proc_update_scores;
        CREATE PROCEDURE mysql_proc_update_scores(
          IN p_category_id TINYINT UNSIGNED, IN p_delta INT
        ) BEGIN
          UPDATE mysql_master
          SET score=GREATEST(-1000,LEAST(1000,score+p_delta)), updated_at=CURRENT_TIMESTAMP(6)
          WHERE category_id=p_category_id;
          SELECT ROW_COUNT() AS rows_updated;
        END //
        DROP FUNCTION IF EXISTS mysql_fn_top_score;
        CREATE FUNCTION mysql_fn_top_score(p_category_id TINYINT UNSIGNED)
        RETURNS INT DETERMINISTIC BEGIN
          DECLARE v INT;
          SELECT MAX(score) INTO v FROM mysql_master WHERE category_id=p_category_id;
          RETURN IFNULL(v,0);
        END //
        DROP FUNCTION IF EXISTS mysql_fn_format_code;
        CREATE FUNCTION mysql_fn_format_code(p_code VARCHAR(40))
        RETURNS VARCHAR(45) DETERMINISTIC BEGIN
          RETURN CONCAT('[',UPPER(p_code),']');
        END //
        DELIMITER ;

        -- ══════════════════════════════════════════════════════════════
        -- TRIGGERS (MySQL has no sequences or materialized views)
        -- ══════════════════════════════════════════════════════════════

        -- Audit table
        CREATE TABLE mysql_master_audit (
          audit_id    BIGINT UNSIGNED NOT NULL AUTO_INCREMENT PRIMARY KEY,
          operation   CHAR(1)         NOT NULL COMMENT 'I=Insert U=Update D=Delete',
          master_id   BIGINT UNSIGNED,
          old_score   INT,
          new_score   INT,
          old_enum    VARCHAR(20),
          new_enum    VARCHAR(20),
          old_active  BOOLEAN,
          new_active  BOOLEAN,
          old_code    VARCHAR(40),
          new_code    VARCHAR(40),
          changed_at  DATETIME(6)     NOT NULL DEFAULT CURRENT_TIMESTAMP(6)
        ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

        -- Score history table (one row per score change)
        CREATE TABLE mysql_score_history (
          history_id  BIGINT UNSIGNED NOT NULL AUTO_INCREMENT PRIMARY KEY,
          master_id   BIGINT UNSIGNED NOT NULL,
          old_score   INT             NOT NULL,
          new_score   INT             NOT NULL,
          delta       INT GENERATED ALWAYS AS (new_score - old_score) STORED,
          changed_at  DATETIME(6)     NOT NULL DEFAULT CURRENT_TIMESTAMP(6),
          INDEX idx_msh_master (master_id),
          INDEX idx_msh_changed (changed_at)
        ) ENGINE=InnoDB;

        DELIMITER //

        -- BEFORE INSERT: normalize score, generate uuid if missing
        CREATE TRIGGER trg_mysql_master_before_insert
        BEFORE INSERT ON mysql_master FOR EACH ROW
        BEGIN
          IF NEW.score > 1000  THEN SET NEW.score  = 1000;  END IF;
          IF NEW.score < -1000 THEN SET NEW.score  = -1000; END IF;
          IF NEW.unique_uuid IS NULL OR NEW.unique_uuid = '' THEN
            SET NEW.unique_uuid = UUID();
          END IF;
          SET NEW.updated_at = CURRENT_TIMESTAMP(6);
        END //

        -- AFTER INSERT: write audit record
        CREATE TRIGGER trg_mysql_master_after_insert
        AFTER INSERT ON mysql_master FOR EACH ROW
        BEGIN
          INSERT INTO mysql_master_audit(operation,master_id,new_score,new_enum,new_active,new_code)
          VALUES('I',NEW.id,NEW.score,NEW.col_enum,NEW.is_active,NEW.unique_code);
        END //

        -- BEFORE UPDATE: clamp score
        CREATE TRIGGER trg_mysql_master_before_update
        BEFORE UPDATE ON mysql_master FOR EACH ROW
        BEGIN
          IF NEW.score > 1000  THEN SET NEW.score = 1000;  END IF;
          IF NEW.score < -1000 THEN SET NEW.score = -1000; END IF;
          SET NEW.updated_at = CURRENT_TIMESTAMP(6);
        END //

        -- AFTER UPDATE: write audit + score history
        CREATE TRIGGER trg_mysql_master_after_update
        AFTER UPDATE ON mysql_master FOR EACH ROW
        BEGIN
          INSERT INTO mysql_master_audit(
            operation,master_id,
            old_score,new_score,old_enum,new_enum,
            old_active,new_active,old_code,new_code
          )
          VALUES('U',NEW.id,OLD.score,NEW.score,OLD.col_enum,NEW.col_enum,OLD.is_active,NEW.is_active,OLD.unique_code,NEW.unique_code);

          IF OLD.score <> NEW.score THEN
            INSERT INTO mysql_score_history(master_id,old_score,new_score)
            VALUES(NEW.id,OLD.score,NEW.score);
          END IF;
        END //

        -- BEFORE DELETE: soft-delete guard for active high-score rows
        CREATE TRIGGER trg_mysql_master_before_delete
        BEFORE DELETE ON mysql_master FOR EACH ROW
        BEGIN
          IF OLD.score > 900 AND OLD.is_active = TRUE THEN
            SIGNAL SQLSTATE '45000'
            SET MESSAGE_TEXT = 'Cannot delete active row with score > 900. Deactivate first.';
          END IF;
        END //

        -- AFTER DELETE: audit record
        CREATE TRIGGER trg_mysql_master_after_delete
        AFTER DELETE ON mysql_master FOR EACH ROW
        BEGIN
          INSERT INTO mysql_master_audit(operation,master_id,old_score,old_enum,old_active,old_code)
          VALUES('D',OLD.id,OLD.score,OLD.col_enum,OLD.is_active,OLD.unique_code);
        END //

        DELIMITER ;

        -- Fire some audit records via DML (triggers will populate audit tables)
        UPDATE mysql_master SET score = 500, col_enum = 'active'   WHERE unique_code = 'CODE-MAX-001';
        UPDATE mysql_master SET score = -200, is_active = FALSE      WHERE unique_code = 'CODE-MIN-002';
        UPDATE mysql_master SET score = 10                           WHERE unique_code = 'CODE-NULL-003';

        SELECT CONCAT('MySQL seed complete: ',COUNT(*),' rows in mysql_master') FROM mysql_master;
        EOSQL

  # ─────────────────────────────────────────────
  # MSSQL (Azure SQL Edge)
  # ─────────────────────────────────────────────

  mssql:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: rapidb-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Rapidb_Pass123!"
    ports:
      - "1433:1433"
    healthcheck:
      test: [ "CMD-SHELL", "test -f /var/opt/mssql/log/errorlog && grep -q 'Recovery is complete' /var/opt/mssql/log/errorlog" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s

  mssql-seed:
    image: mcr.microsoft.com/mssql-tools:latest
    container_name: rapidb-mssql-seed
    depends_on:
      mssql:
        condition: service_healthy
    restart: on-failure
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        set -eu
        SQLCMD_BIN="/opt/mssql-tools18/bin/sqlcmd"
        if [ ! -x "$$SQLCMD_BIN" ]; then SQLCMD_BIN="/opt/mssql-tools/bin/sqlcmd"; fi
        if [ ! -x "$$SQLCMD_BIN" ]; then echo "sqlcmd not found in sql edge image"; exit 1; fi

        "$$SQLCMD_BIN" -b -S mssql -U sa -P 'Rapidb_Pass123!' -Q "
          IF DB_ID('rapidb_mssql_db') IS NOT NULL
          BEGIN
            ALTER DATABASE rapidb_mssql_db SET SINGLE_USER WITH ROLLBACK IMMEDIATE;
            DROP DATABASE rapidb_mssql_db;
          END;
          CREATE DATABASE rapidb_mssql_db;
        "
        "$$SQLCMD_BIN" -b -S mssql -U sa -P 'Rapidb_Pass123!' -d rapidb_mssql_db << 'EOSQL'

        SET ANSI_NULLS ON;
        SET QUOTED_IDENTIFIER ON;
        SET ANSI_PADDING ON;
        SET ANSI_WARNINGS ON;
        SET CONCAT_NULL_YIELDS_NULL ON;
        SET ARITHABORT ON;
        GO

        -- reference table
        CREATE TABLE mssql_category (
          category_id   TINYINT      PRIMARY KEY,
          category_name NVARCHAR(50) NOT NULL,
          description   NVARCHAR(255),
          CONSTRAINT uq_mssql_cat UNIQUE(category_name)
        );
        INSERT INTO mssql_category VALUES
          (1,N'alpha',N'First'),(2,N'beta',N'Second'),(3,N'gamma',N'Third'),
          (4,N'delta',N'Fourth'),(5,N'epsilon',N'Fifth');
        GO

        -- master table — every MSSQL type
        CREATE TABLE mssql_master (
          id                   BIGINT           NOT NULL IDENTITY(1,1),
          category_id          TINYINT          NOT NULL,
          unique_code          NVARCHAR(40)     NOT NULL,
          unique_guid          UNIQUEIDENTIFIER NOT NULL DEFAULT NEWID(),
          -- exact numeric
          col_tinyint          TINYINT,
          col_smallint         SMALLINT,
          col_int              INT,
          col_bigint           BIGINT,
          col_bit              BIT,
          col_decimal          DECIMAL(18,6),
          col_numeric          NUMERIC(18,6),
          col_money            MONEY,
          col_smallmoney       SMALLMONEY,
          -- approximate numeric
          col_float            FLOAT(53),
          col_real             REAL,
          -- character
          col_char             CHAR(10),
          col_varchar          VARCHAR(500),
          col_varchar_max      VARCHAR(MAX),
          col_nchar            NCHAR(10),
          col_nvarchar         NVARCHAR(500),
          col_nvarchar_max     NVARCHAR(MAX),
          col_text             TEXT,
          col_ntext            NTEXT,
          -- binary
          col_binary           BINARY(16),
          col_varbinary        VARBINARY(255),
          col_varbinary_max    VARBINARY(MAX),
          col_image            IMAGE,
          -- datetime
          col_date             DATE,
          col_time             TIME(7),
          col_datetime         DATETIME,
          col_datetime2        DATETIME2(7),
          col_datetimeoffset   DATETIMEOFFSET(7),
          col_smalldatetime    SMALLDATETIME,
          -- special
          col_uniqueidentifier UNIQUEIDENTIFIER DEFAULT NEWID(),
          col_rowversion       ROWVERSION,
          col_sql_variant      SQL_VARIANT,
          col_xml              XML,
          -- spatial
          col_geography        GEOGRAPHY,
          col_geometry         GEOMETRY,
          -- meta
          created_at           DATETIME2(7)     NOT NULL DEFAULT SYSUTCDATETIME(),
          updated_at           DATETIME2(7)     NOT NULL DEFAULT SYSUTCDATETIME(),
          is_active            BIT              NOT NULL DEFAULT 1,
          score                INT              NOT NULL DEFAULT 0,
          CONSTRAINT pk_mssql_master  PRIMARY KEY CLUSTERED(id),
          CONSTRAINT uq_mssql_code    UNIQUE(unique_code),
          CONSTRAINT uq_mssql_guid    UNIQUE(unique_guid),
          CONSTRAINT fk_mssql_cat     FOREIGN KEY(category_id) REFERENCES mssql_category(category_id) ON UPDATE CASCADE,
          CONSTRAINT chk_mssql_score  CHECK(score BETWEEN -1000 AND 1000),
          CONSTRAINT chk_mssql_code   CHECK(LEN(unique_code)>=3)
        );
        GO

        -- indexes
        CREATE NONCLUSTERED INDEX idx_mssql_int       ON mssql_master(col_int);
        CREATE NONCLUSTERED INDEX idx_mssql_cat_score ON mssql_master(category_id,score DESC);
        CREATE NONCLUSTERED INDEX idx_mssql_active    ON mssql_master(created_at) WHERE is_active=1;
        CREATE UNIQUE NONCLUSTERED INDEX idx_mssql_guid ON mssql_master(unique_guid);
        CREATE NONCLUSTERED INDEX idx_mssql_covering  ON mssql_master(category_id,col_date) INCLUDE(unique_code,score,col_nvarchar);
        CREATE PRIMARY XML INDEX idx_mssql_xml ON mssql_master(col_xml);
